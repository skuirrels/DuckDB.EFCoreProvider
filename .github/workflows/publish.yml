name: Publish

# Publishes DuckDB.EFCoreProvider and DuckDB.EFCoreProvider.NTS to NuGet.org
# using Trusted Publishing (GitHub OIDC -> short-lived API key). No stored secret.
# Trigger by publishing a GitHub Release (tag), or run manually.

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    name: Pack and publish to NuGet.org
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # required for the OIDC token exchange with NuGet.org
      contents: read

    steps:
    - uses: actions/checkout@v6

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x

    - name: Pack core
      run: dotnet pack src/DuckDB.EFCoreProvider/DuckDB.EFCoreProvider.csproj -c Release -o artifacts

    - name: Pack NTS (only when its version is not already published)
      # NTS is versioned independently and usually unchanged on a core release. Re-packing an already-published
      # NTS version and pushing its .snupkg fails symbol validation: SourceLink embeds the current commit in the
      # rebuilt PDB, so it no longer matches the DLL in the .nupkg already on NuGet (which --skip-duplicate keeps).
      # So only pack NTS — and therefore only push it — when this is a genuinely new NTS version.
      run: |
        id=duckdb.efcoreprovider.nts
        ver=$(sed -n 's:.*<PackageVersion>\(.*\)</PackageVersion>.*:\1:p' src/DuckDB.EFCoreProvider.NTS/DuckDB.EFCoreProvider.NTS.csproj | head -1)
        published=$(curl -s "https://api.nuget.org/v3-flatcontainer/$id/index.json" || echo '{}')
        if echo "$published" | grep -q "\"$ver\""; then
          echo "DuckDB.EFCoreProvider.NTS $ver is already published; skipping pack/push."
        else
          echo "Packing DuckDB.EFCoreProvider.NTS $ver (new version)."
          dotnet pack src/DuckDB.EFCoreProvider.NTS/DuckDB.EFCoreProvider.NTS.csproj -c Release -o artifacts
        fi

    - name: NuGet login (OIDC -> short-lived API key)
      uses: NuGet/login@v1
      id: login
      with:
        user: skuirrels

    - name: Push to NuGet.org
      # Pushes both the .nupkg and its .snupkg symbol package (the *.nupkg glob does not match .snupkg).
      run: >
        dotnet nuget push "artifacts/*.nupkg" "artifacts/*.snupkg"
        --api-key ${{ steps.login.outputs.NUGET_API_KEY }}
        --source https://api.nuget.org/v3/index.json
        --skip-duplicate
